name: 股市戰略自動發報

on:
  schedule:
    # 💡 提早排隊：台灣 09:15 = UTC 01:15 (為 09:30 搶伺服器)
    - cron: '15 1 * * 1-5' 
    # 💡 提早排隊：台灣 12:45 = UTC 04:45 (為 13:00 搶伺服器)
    - cron: '45 4 * * 1-5'
    # 💡 提早排隊：台灣 15:15 = UTC 07:15 (為 15:30 搶伺服器)
    - cron: '15 7 * * 1-5'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install pandas yfinance gspread google-auth
      - name: Run script
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python DailyReport.py

          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python DailyReport.py
