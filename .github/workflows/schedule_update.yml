name: Update Finance Data

on:
  schedule:
    - cron: '0 0,6,12 * * *' # 每天 UTC 時間 0點, 6點, 12點執行 (台灣時間早上8點, 下午2點, 晚上8點)
  workflow_dispatch: # 允許手動觸發

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests gspread oauth2client urllib3 pandas lxml html5lib

    - name: Run update_finance.py
      env:
        GOOGLE_KEY_JSON: ${{ secrets.GOOGLE_KEY_JSON }}
      run: python update_finance.py

    - name: Run test_moneydj.py (B計畫測試)
      run: python test_moneydj.py
