name: 財報自動更新排程

on:
  schedule:
    # 這裡設定時間：目前設定為每天台灣時間晚上 8 點 (UTC 12:00) 執行一次
    - cron: '0 12 * * *'
  workflow_dispatch: 
    # 加入這個參數，讓您可以隨時在 GitHub 網頁上手動按下「立即執行」按鈕測試

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: 下載程式碼
        uses: actions/checkout@v3

      - name: 設定 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安裝所需套件
        run: |
          pip install requests gspread google-auth urllib3

      - name: 執行資料更新程式
        env:
          # 將 GitHub Secrets 裡的金鑰，傳遞給 Python 程式
          GOOGLE_KEY_JSON: ${{ secrets.GOOGLE_KEY_JSON }}
        run: python update_finance.py
